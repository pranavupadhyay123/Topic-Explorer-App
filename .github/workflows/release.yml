name: Release Builds

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: topic-explorer-linux-amd64
            is_linux: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: topic-explorer-windows-amd64.exe
            is_windows: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: topic-explorer-macos-amd64
            is_macos: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: topic-explorer-macos-arm64
            is_macos: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build project
        run: cargo build --release --target ${{ matrix.target }}

      # LINUX PACKAGING (cargo-deb)
      - name: Install cargo-deb (Linux)
        if: matrix.is_linux
        run: cargo install cargo-deb

      - name: Build .deb package (Linux)
        if: matrix.is_linux
        run: cargo deb --target ${{ matrix.target }} --no-build

      - name: Upload Linux .deb Artifact
        if: matrix.is_linux
        uses: actions/upload-artifact@v4
        with:
          name: topic-explorer-linux-deb
          path: target/${{ matrix.target }}/debian/*.deb

      # WINDOWS PACKAGING
      - name: Prepare Windows Executable
        if: matrix.is_windows
        run: |
          mkdir release_package
          copy target\${{ matrix.target }}\release\topic-explorer.exe release_package\
          # Assuming there might be assets, you can copy them too.
          xcopy static release_package\static\ /s /e

      - name: Upload Windows Executable Artifact
        if: matrix.is_windows
        uses: actions/upload-artifact@v4
        with:
          name: topic-explorer-windows
          path: release_package/

      # MACOS PACKAGING
      - name: Install cargo-bundle (macOS)
        if: matrix.is_macos
        run: cargo install cargo-bundle

      - name: Build macOS App Bundle
        if: matrix.is_macos
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Upload macOS App Bundle Artifact
        if: matrix.is_macos
        uses: actions/upload-artifact@v4
        with:
          name: topic-explorer-macos-app-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/osx/Topic Explorer.app

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Explorer — AI-Powered Learning</title>
  <meta name="description" content="Explore any topic with AI-powered concept mapping, knowledge graphs, quizzes, and interactive learning">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <a href="/" class="app-logo">
        <span class="logo-icon">🧠</span>
        <span>Topic Explorer</span>
      </a>
      <nav class="app-nav">
        <a href="/" class="nav-link active">🏠 Dashboard</a>
        <a href="/notes.html" class="nav-link">📝 Notes</a>
        <a href="/settings.html" class="nav-link">⚙️ Settings</a>
      </nav>
    </header>

    <!-- Explore Input -->
    <div class="explore-input-container">
      <input
        type="text"
        class="explore-input"
        id="explore-input"
        placeholder="What would you like to explore? Try 'Quantum Computing', 'Machine Learning', 'Roman Empire'..."
        autocomplete="off"
      >
      <button class="btn btn-primary btn-lg explore-input-btn" id="explore-btn" onclick="quickExplore()">
        🚀 Explore
      </button>
    </div>

    <!-- Workspace Selector -->
    <div class="section-header">
      <div>
        <h2 class="section-title">Workspaces</h2>
        <p class="section-subtitle">Organize your learning into focused workspaces</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-workspace-modal')">
        ✨ New Workspace
      </button>
    </div>

    <div id="workspaces-grid" class="grid grid-auto mb-lg">
      <!-- Workspaces loaded dynamically -->
    </div>

    <!-- Topics -->
    <div class="section-header">
      <div>
        <h2 class="section-title">Recent Topics</h2>
        <p class="section-subtitle" id="topics-subtitle">Your explored topics</p>
      </div>
      <div class="flex gap-sm">
        <select class="select" id="workspace-filter" onchange="loadTopics()">
          <option value="">All Workspaces</option>
        </select>
      </div>
    </div>

    <div id="topics-grid" class="grid grid-auto">
      <!-- Topics loaded dynamically -->
    </div>
  </div>

  <!-- Create Workspace Modal -->
  <div class="modal-overlay" id="create-workspace-modal">
    <div class="modal">
      <h3 class="modal-title">✨ Create Workspace</h3>
      <div class="input-group mb-md">
        <label class="input-label">Name</label>
        <input type="text" class="input" id="ws-name" placeholder="e.g. Machine Learning Journey">
      </div>
      <div class="input-group mb-md">
        <label class="input-label">Description</label>
        <textarea class="textarea" id="ws-desc" placeholder="What's this workspace about?"></textarea>
      </div>
      <div class="grid grid-2 gap-md mb-md">
        <div class="input-group">
          <label class="input-label">Color</label>
          <input type="color" class="input" id="ws-color" value="#6366f1" style="height:42px;padding:4px;">
        </div>
        <div class="input-group">
          <label class="input-label">Icon</label>
          <select class="select" id="ws-icon">
            <option value="📚">📚 Books</option>
            <option value="🔬">🔬 Science</option>
            <option value="💻">💻 Code</option>
            <option value="🎨">🎨 Art</option>
            <option value="🧮">🧮 Math</option>
            <option value="🌍">🌍 World</option>
            <option value="🧠">🧠 Brain</option>
            <option value="⚡">⚡ Energy</option>
            <option value="🎵">🎵 Music</option>
            <option value="🏗️">🏗️ Engineering</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('create-workspace-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createWorkspace()">Create</button>
      </div>
    </div>
  </div>

  <!-- Create Topic Modal -->
  <div class="modal-overlay" id="create-topic-modal">
    <div class="modal">
      <h3 class="modal-title">🔍 New Topic</h3>
      <div class="input-group mb-md">
        <label class="input-label">Topic</label>
        <input type="text" class="input" id="topic-title" placeholder="e.g. Neural Networks">
      </div>
      <div class="input-group mb-md">
        <label class="input-label">Workspace</label>
        <select class="select" id="topic-workspace"></select>
      </div>
      <div class="input-group mb-md">
        <label class="input-label">Description (optional)</label>
        <textarea class="textarea" id="topic-desc" placeholder="Add context to get better AI results..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('create-topic-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createTopic()">Create & Explore</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
